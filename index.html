<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoProxy Specimen Lab</title>
    <!-- Babylon.js Core and Dependencies -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/serializers/babylonjs.serializers.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital@1&family=Space+Mono&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="top-bar">
        <span>NeoProxy Specimen Lab // Generative Sculpture Engine</span>
        <div class="status-dot"></div>
    </div>
    
    <div id="left-panel" class="panel">
        <h2>Parameters</h2>
        
        <div class="control-group">
            <label>Algorithm</label>
            <div id="algo-selector">
                <button class="active" data-algo="lorenz">Lorenz</button>
                <button data-algo="thomas">Thomas</button>
                <button data-algo="clifford">Clifford</button>
                <button data-algo="rossler">Rössler</button>
            </div>
        </div>
        
        <div class="control-group">
            <label>Iterations (<span id="val-iters">50000</span>)</label>
            <input type="range" id="iters" min="20000" max="150000" step="1000" value="50000">
        </div>
        
        <div class="control-group">
            <label>Tube Radius (<span id="val-radius">0.10</span>)</label>
            <input type="range" id="radius" min="0.02" max="0.25" step="0.01" value="0.10">
        </div>
        
        <div class="control-group">
            <label>Scale (<span id="val-scale">0.10</span>)</label>
            <input type="range" id="scale" min="0.05" max="0.5" step="0.01" value="0.10">
        </div>
        
        <div class="control-group">
            <label>Seed</label>
            <div class="seed-row">
                <input type="number" id="seed" value="42">
                <button id="btn-rand-seed">Rand</button>
            </div>
        </div>
        
        <div style="flex-grow: 1;"></div>
        
        <button id="btn-generate" class="primary">Generate System</button>
        <button id="btn-export">Export STL</button>
    </div>
    
    <canvas id="renderCanvas"></canvas>
    
    <div id="right-panel" class="panel">
        <h2>Data</h2>
        
        <div id="specimen-id">Specimen <span class="highlight">#0001</span></div>
        
        <div class="equations" id="eq-display">
            <!-- Filled via JS -->
        </div>
        
        <div class="params" id="param-display">
            <!-- Filled via JS -->
        </div>
        
        <div class="stats">
            <div>Points generated: <span id="stat-points" class="highlight">0</span></div>
            <div>Meshes built: <span id="stat-meshes" class="highlight">0</span></div>
        </div>
    </div>
    
    <div id="bottom-bar">
        <span>Status: <span id="status-text">Ready</span></span>
        <span>Active: <span id="active-algo-seed">Lorenz | Seed: 42</span></span>
    </div>

    <!-- Custom App Logic -->
    <script src="app.js"></script>
</body>
</html>
