<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEOPROXY // IDENTITY CARDS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;font-family:'DM Mono',monospace;padding:40px;min-height:100vh}

/* CONTROLS (hidden in print) */
#controls{margin-bottom:32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
#seed-input{background:#1a1a2e;border:1px solid #333355;color:#ccccdd;font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;letter-spacing:.1em;width:200px}
#seed-input:focus{outline:none;border-color:#b400ff}
.ctrl-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;padding:8px 16px;border:1px solid;background:transparent;cursor:pointer;transition:all .15s;text-transform:uppercase;color:#b400ff;border-color:#b400ff}
.ctrl-btn:hover{background:rgba(180,0,255,.1)}
.ctrl-btn.green{color:#00ff9d;border-color:#00ff9d}.ctrl-btn.green:hover{background:rgba(0,255,157,.08)}
#ctrl-label{font-size:9px;color:#333355;letter-spacing:.15em}
#status-msg{font-size:8px;letter-spacing:.2em;padding:4px 10px;border:1px solid}
#status-msg.safe{color:#00ff9d;border-color:#00ff9d33}
#status-msg.risk{color:#ffb800;border-color:#ffb80033}
#status-msg.fail{color:#ff2b2b;border-color:#ff2b2b33}

/* CARDS GRID */
#cards-grid{display:flex;flex-wrap:wrap;gap:24px}

/* SINGLE CARD — business card dimensions 85.6 × 53.98 mm */
.np-card{
  width: 323px;  /* 85.6mm at 96dpi */
  height: 204px; /* 53.98mm at 96dpi */
  background: #000;
  border: 1px solid #1a1a2e;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform .2s;
}
.np-card:hover{ transform: scale(1.02) }

/* CARD INNER */
.card-inner{
  position: absolute; inset: 0;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TOP ROW */
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-logo{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.25em;color:rgba(180,0,255,.6)}
.card-cert{font-size:6px;letter-spacing:.2em;padding:3px 7px;border:1px solid;display:flex;align-items:center;gap:4px}
.card-cert.safe{border-color:rgba(0,255,157,.3);color:rgba(0,255,157,.6)}
.card-cert.risk{border-color:rgba(255,184,0,.3);color:rgba(255,184,0,.6)}
.card-cert-dot{width:4px;height:4px;border-radius:50%}
.cert-dot-safe{background:#00ff9d}
.cert-dot-risk{background:#ffb800}

/* MID — ID */
.card-id-block{flex:1;display:flex;align-items:center}
.card-id{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;letter-spacing:.05em;color:#1a1a2e;/* will be colored by JS */}
.card-id span{/* accent */}

/* BOTTOM ROW */
.card-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.card-specs{display:flex;flex-direction:column;gap:3px}
.card-spec-row{font-size:6px;letter-spacing:.12em;color:#2a2a3e;line-height:1.4}
.card-spec-row strong{color:#3a3a5a}

/* QR PLACEHOLDER */
.card-qr{
  width: 54px; height: 54px;
  border: 1px solid #1a1a2e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; flex-shrink:0;
}
.card-qr canvas{width:44px;height:44px;display:block;image-rendering:pixelated}
.card-qr-label{font-size:5px;letter-spacing:.15em;color:#1a1a2e}

/* BACKGROUND DECORATION */
.card-ring-bg{
  position:absolute;
  right:-40px;top:50%;transform:translateY(-50%);
  opacity:.04;
  pointer-events:none;
}

/* SCAN LINE EFFECT */
.card::after{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.01) 3px,rgba(255,255,255,.01) 4px);
  pointer-events:none;
}

/* GRID LINE ACCENT */
.card-hline{position:absolute;left:0;right:0;height:1px;background:rgba(180,0,255,.06)}
.card-vline{position:absolute;top:0;bottom:0;width:1px;background:rgba(180,0,255,.04)}

/* PRINT STYLES */
@media print{
  body{background:#000;padding:10mm}
  #controls{display:none}
  .np-card{border:none;break-inside:avoid}
  #cards-grid{gap:5mm}
  .np-card:hover{transform:none}
}
</style>
</head>
<body>

<div id="controls">
  <span class="ctrl-label" style="font-size:9px;color:#333355;letter-spacing:.2em">SEEDS (separados por coma o espacio):</span>
  <input type="text" id="seed-input" placeholder="48291, 19302, 77543..." value="">
  <button class="ctrl-btn" onclick="generateCards()">▶ GENERAR TARJETAS</button>
  <button class="ctrl-btn green" onclick="window.print()">⎙ IMPRIMIR</button>
  <div id="status-msg" class="safe" style="display:none"></div>
</div>

<div id="cards-grid"></div>

<script>
// ─── SEEDED RNG & PARAMS ─────────────────────────────────────────────────────
function mkRand(seed){let s=seed>>>0;return()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/0xffffffff}}
function paramsFromSeed(seed){
  const r=mkRand(seed)
  return{diam:16+r()*4,width:5+r()*6,thick:1.4+r()*2,spikes:r()>.3,sc:Math.round(6+r()*20),sh:.3+r()*2.8,waves:r()>.25,wf:Math.round(1+r()*8),wa:.1+r()*1.2,voro:r()>.35,vi:r()*1.2,cuts:r()>.4,cn:Math.round(1+r()*14),seed}
}
const SAFETY_RULES=[
  {level:'FAIL',check:p=>p.thick<1.2},{level:'RISK',check:p=>p.thick<1.5},
  {level:'RISK',check:p=>p.spikes&&p.sh>2.5},{level:'RISK',check:p=>p.spikes&&p.sh>1.8&&p.sc>20},
  {level:'RISK',check:p=>p.voro&&p.vi>1.0},{level:'RISK',check:p=>p.cuts&&p.cn>10},
  {level:'RISK',check:p=>p.cuts&&p.cn>6&&p.thick<1.8},
]
function checkSafety(p){
  let status='SAFE';const issues=[]
  for(const r of SAFETY_RULES){if(r.check(p)){if(r.level==='FAIL') status='FAIL';else if(status!=='FAIL') status='RISK'}}
  return{status,issues}
}

// ─── TINY QR PATTERN (decorative, seed-based pixel art) ─────────────────────
function drawQR(canvas, seed){
  const ctx=canvas.getContext('2d')
  const S=11 // grid cells
  const cs=Math.floor(canvas.width/S)
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height)
  const r=mkRand(seed+42)
  // Corner finder patterns
  const corners=[[0,0],[0,S-3],[S-3,0]]
  for(const[cx,cy] of corners){
    for(let y=0;y<3;y++) for(let x=0;x<3;x++){
      const filled=(x===0||x===2||y===0||y===2||(x===1&&y===1))
      ctx.fillStyle=filled?'rgba(180,0,255,0.8)':'#000'
      ctx.fillRect((cx+x)*cs,(cy+y)*cs,cs,cs)
    }
  }
  // Data cells (random based on seed)
  ctx.fillStyle='rgba(180,0,255,0.5)'
  for(let y=0;y<S;y++) for(let x=0;x<S;x++){
    if(x<3&&y<3||x<3&&y>S-4||x>S-4&&y<3) continue
    if(r()>.55) ctx.fillRect(x*cs,y*cs,cs,cs)
  }
}

// ─── CARD BUILDER ────────────────────────────────────────────────────────────
function buildCard(seed){
  const p=paramsFromSeed(seed)
  const safety=checkSafety(p)
  const padSeed=String(seed).padStart(5,'0')

  const certClass=safety.status==='SAFE'?'safe':'risk'
  const certLabel=safety.status==='SAFE'?'NP CERTIFIED':'NP UNSTABLE'
  const idColor=safety.status==='SAFE'?'rgba(180,0,255,0.18)':'rgba(255,184,0,0.12)'
  const idAccent=safety.status==='SAFE'?'rgba(180,0,255,0.5)':'rgba(255,184,0,0.5)'

  const mods=[p.spikes&&'spikes',p.waves&&'waves',p.voro&&'voro',p.cuts&&'cuts'].filter(Boolean)

  const card=document.createElement('div')
  card.className='np-card'
  card.title=`Click para abrir NP-${padSeed}`
  card.onclick=()=>window.open(`np-ring.html?seed=${seed}`,'_blank')

  card.innerHTML=`
    <div class="card-hline" style="top:28%"></div>
    <div class="card-hline" style="top:72%"></div>
    <div class="card-vline" style="left:70%"></div>

    <div class="card-inner">
      <div class="card-top">
        <div class="card-logo">NEOPROXY</div>
        <div class="card-cert ${certClass}">
          <div class="card-cert-dot cert-dot-${certClass}"></div>
          ${certLabel}
        </div>
      </div>

      <div class="card-id-block">
        <div class="card-id" style="color:${idColor}">
          NP–<span style="color:${idAccent}">${padSeed}</span>
        </div>
      </div>

      <div class="card-bottom">
        <div class="card-specs">
          <div class="card-spec-row">Ø <strong>${p.diam.toFixed(1)}mm</strong> · W <strong>${p.width.toFixed(1)}mm</strong> · T <strong>${p.thick.toFixed(1)}mm</strong></div>
          <div class="card-spec-row">${mods.length?mods.join(' · '):'plain'}</div>
          <div class="card-spec-row" style="color:#1a1a2e;margin-top:2px">neoproxy.art?seed=${seed}</div>
        </div>
        <div class="card-qr">
          <canvas width="44" height="44" id="qr-${seed}"></canvas>
          <div class="card-qr-label">SCAN</div>
        </div>
      </div>
    </div>
  `

  // Draw QR
  setTimeout(()=>{
    const qrCanvas=document.getElementById(`qr-${seed}`)
    if(qrCanvas) drawQR(qrCanvas,seed)
  },50)

  return card
}

function generateCards(){
  const input=document.getElementById('seed-input').value
  const seeds=input.split(/[\s,]+/).map(s=>parseInt(s.trim())).filter(s=>!isNaN(s)&&s>=0&&s<=99999)

  if(seeds.length===0){
    showStatus('INGRESA SEEDS VÁLIDOS (0–99999)','risk'); return
  }

  const grid=document.getElementById('cards-grid')
  grid.innerHTML=''
  seeds.forEach(s=>grid.appendChild(buildCard(s)))
  showStatus(`${seeds.length} TARJETA${seeds.length>1?'S':''} GENERADA${seeds.length>1?'S':''}  ·  LISTAS PARA IMPRIMIR`,'safe')
}

function showStatus(msg,cls){
  const el=document.getElementById('status-msg')
  el.textContent=msg; el.className=cls; el.style.display='block'
}

// Auto-generate if seeds in URL
const up=new URLSearchParams(window.location.search)
if(up.has('seeds')){
  document.getElementById('seed-input').value=up.get('seeds')
  generateCards()
}
</script>
</body>
</html>
