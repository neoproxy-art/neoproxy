<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gennosGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9d00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#000000"/>

  <!-- AI Brain network -->
  <circle cx="150" cy="150" r="80" fill="none" stroke="url(#gennosGradient)" stroke-width="3" opacity="0.6"/>
  <circle cx="150" cy="150" r="60" fill="none" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.4"/>
  <circle cx="150" cy="150" r="40" fill="none" stroke="url(#gennosGradient)" stroke-width="1" opacity="0.3"/>

  <!-- Neural nodes -->
  <circle cx="150" cy="70" r="8" fill="url(#gennosGradient)" opacity="0.8"/>
  <circle cx="220" cy="100" r="6" fill="url(#gennosGradient)" opacity="0.7"/>
  <circle cx="220" cy="200" r="7" fill="url(#gennosGradient)" opacity="0.8"/>
  <circle cx="150" cy="230" r="5" fill="url(#gennosGradient)" opacity="0.6"/>
  <circle cx="80" cy="200" r="6" fill="url(#gennosGradient)" opacity="0.7"/>
  <circle cx="80" cy="100" r="7" fill="url(#gennosGradient)" opacity="0.8"/>

  <!-- Neural connections -->
  <line x1="150" y1="70" x2="220" y2="100" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="100" x2="220" y2="200" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="200" x2="150" y2="230" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="230" x2="80" y2="200" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="200" x2="80" y2="100" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="100" x2="150" y2="70" stroke="url(#gennosGradient)" stroke-width="2" opacity="0.5"/>

  <!-- Center AI core -->
  <circle cx="150" cy="150" r="20" fill="url(#gennosGradient)" opacity="0.9"/>
  <circle cx="150" cy="150" r="12" fill="#000000"/>
  <text x="150" y="156" font-family="Arial, sans-serif" font-size="10" fill="url(#gennosGradient)" text-anchor="middle" opacity="0.8">AI</text>

  <!-- Title -->
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="20" fill="#ff9d00" text-anchor="middle" opacity="0.8">GENERATIVE</text>
  <text x="150" y="290" font-family="Arial, sans-serif" font-size="14" fill="#ff0080" text-anchor="middle" opacity="0.6">AI AGENT</text>
</svg>