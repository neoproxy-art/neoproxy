<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#000000"/>

  <!-- Data visualization bars -->
  <rect x="60" y="200" width="20" height="60" fill="url(#dGradient)" opacity="0.8"/>
  <rect x="90" y="180" width="20" height="80" fill="url(#dGradient)" opacity="0.8"/>
  <rect x="120" y="160" width="20" height="100" fill="url(#dGradient)" opacity="0.8"/>
  <rect x="150" y="140" width="20" height="120" fill="url(#dGradient)" opacity="0.9"/>
  <rect x="180" y="170" width="20" height="90" fill="url(#dGradient)" opacity="0.8"/>
  <rect x="210" y="190" width="20" height="70" fill="url(#dGradient)" opacity="0.8"/>
  <rect x="240" y="210" width="20" height="50" fill="url(#dGradient)" opacity="0.7"/>

  <!-- Data points/scatter plot -->
  <circle cx="80" cy="120" r="4" fill="url(#dGradient)" opacity="0.6"/>
  <circle cx="120" cy="100" r="3" fill="url(#dGradient)" opacity="0.7"/>
  <circle cx="160" cy="90" r="5" fill="url(#dGradient)" opacity="0.8"/>
  <circle cx="200" cy="110" r="4" fill="url(#dGradient)" opacity="0.6"/>
  <circle cx="240" cy="130" r="3" fill="url(#dGradient)" opacity="0.7"/>

  <!-- Database/server representation -->
  <rect x="120" y="50" width="60" height="40" fill="none" stroke="url(#dGradient)" stroke-width="2" opacity="0.7"/>
  <rect x="125" y="55" width="50" height="6" fill="url(#dGradient)" opacity="0.5"/>
  <rect x="125" y="65" width="50" height="6" fill="url(#dGradient)" opacity="0.5"/>
  <rect x="125" y="75" width="50" height="6" fill="url(#dGradient)" opacity="0.5"/>
  <rect x="125" y="85" width="50" height="6" fill="url(#dGradient)" opacity="0.5"/>

  <!-- Analytics eye/visor -->
  <ellipse cx="150" cy="30" rx="25" ry="15" fill="none" stroke="url(#dGradient)" stroke-width="3" opacity="0.8"/>
  <circle cx="150" cy="30" r="8" fill="url(#dGradient)" opacity="0.9"/>
  <circle cx="150" cy="30" r="4" fill="#000000"/>

  <!-- Title -->
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="20" fill="#8000ff" text-anchor="middle" opacity="0.8">DATA</text>
  <text x="150" y="290" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" opacity="0.6">& ANALYTICS</text>
</svg>