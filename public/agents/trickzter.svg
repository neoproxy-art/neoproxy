<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trickzterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff9d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#000000"/>

  <!-- Security shield -->
  <path d="M150,60 L200,100 L200,180 L150,220 L100,180 L100,100 Z"
        fill="none" stroke="url(#trickzterGradient)" stroke-width="4" opacity="0.8"/>

  <!-- Inner shield layers -->
  <path d="M150,80 L180,110 L180,170 L150,200 L120,170 L120,110 Z"
        fill="none" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.6"/>
  <path d="M150,100 L160,115 L160,160 L150,180 L140,160 L140,115 Z"
        fill="none" stroke="url(#trickzterGradient)" stroke-width="1" opacity="0.4"/>

  <!-- Network nodes/connections -->
  <circle cx="150" cy="140" r="8" fill="url(#trickzterGradient)" opacity="0.9"/>
  <circle cx="130" cy="120" r="5" fill="url(#trickzterGradient)" opacity="0.7"/>
  <circle cx="170" cy="120" r="5" fill="url(#trickzterGradient)" opacity="0.7"/>
  <circle cx="130" cy="160" r="5" fill="url(#trickzterGradient)" opacity="0.7"/>
  <circle cx="170" cy="160" r="5" fill="url(#trickzterGradient)" opacity="0.7"/>

  <!-- Connection lines -->
  <line x1="150" y1="140" x2="130" y2="120" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="140" x2="170" y2="120" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="140" x2="130" y2="160" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="140" x2="170" y2="160" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.5"/>

  <!-- Lock symbol -->
  <rect x="140" y="125" width="20" height="15" rx="2" fill="none" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.8"/>
  <path d="M145,135 Q145,130 150,130 Q155,130 155,135"
        fill="none" stroke="url(#trickzterGradient)" stroke-width="2" opacity="0.8"/>
  <circle cx="150" cy="142" r="3" fill="url(#trickzterGradient)" opacity="0.9"/>

  <!-- Firewall representation -->
  <rect x="110" y="70" width="80" height="4" fill="url(#trickzterGradient)" opacity="0.6"/>
  <rect x="110" y="78" width="80" height="4" fill="url(#trickzterGradient)" opacity="0.6"/>
  <rect x="110" y="86" width="80" height="4" fill="url(#trickzterGradient)" opacity="0.6"/>

  <!-- Title -->
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="18" fill="#ff0080" text-anchor="middle" opacity="0.8">SECURITY</text>
  <text x="150" y="290" font-family="Arial, sans-serif" font-size="14" fill="#00ff9d" text-anchor="middle" opacity="0.6">& NETWORK</text>
</svg>