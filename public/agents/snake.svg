<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snakeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#000000"/>

  <!-- Snake body -->
  <path d="M50,150 Q100,100 150,150 Q200,200 250,150 Q200,100 150,150 Q100,200 50,150"
        stroke="url(#snakeGradient)" stroke-width="8" fill="none" opacity="0.8"/>

  <!-- Snake head -->
  <circle cx="250" cy="150" r="15" fill="url(#snakeGradient)" opacity="0.9"/>
  <circle cx="255" cy="145" r="3" fill="#000000"/>
  <circle cx="255" cy="145" r="1.5" fill="#ffffff"/>

  <!-- Python logo elements -->
  <text x="150" y="200" font-family="Arial, sans-serif" font-size="24" fill="#00ff9d" text-anchor="middle" opacity="0.7">PYTHON</text>
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" opacity="0.5">SYSTEM AGENT</text>

  <!-- Glow effect -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="url(#snakeGradient)" stroke-width="1" opacity="0.2"/>
</svg>